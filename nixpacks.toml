# Railway/Nixpacks build configuration.
# "..." keeps the default packages detected by the Python provider;
# deno is required by yt-dlp 2026+ to solve YouTube's JS challenges.
# The rest are Chromium runtime shared libs, required by Playwright
# (login en vivo, admin) -- Playwright's own installer downloads the
# Chromium binary itself in [phases.install], these just satisfy its
# dynamic-linking dependencies on a Nix-based image.
[phases.setup]
nixPkgs = [
  "...", "deno",
  "nss", "nspr", "atk", "at-spi2-atk", "cups", "dbus", "libdrm", "mesa",
  "pango", "cairo", "alsa-lib", "gtk3", "libxkbcommon", "libxshmfence",
  "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext",
  "xorg.libXfixes", "xorg.libXrandr", "xorg.libxcb"
]

# Nixpacks builds and runs in separate stages -- the default browser cache
# (~/.cache/ms-playwright) written during [phases.install] does not carry
# over into the final runtime image, so at request time Playwright finds an
# empty directory ("Executable doesn't exist"). Fix: pin
# PLAYWRIGHT_BROWSERS_PATH to a folder inside the app's own directory, which
# DOES get copied into the final image.
#
# [variables] only applies at RUNTIME (Nixpacks docs), not during
# [phases.install] -- so the install command below sets it inline too,
# otherwise Chromium would download to the default path during build while
# the app looks in this one at runtime, recreating the exact same mismatch.
[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/.playwright-browsers"

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "PLAYWRIGHT_BROWSERS_PATH=/app/.playwright-browsers python -m playwright install chromium"
]
